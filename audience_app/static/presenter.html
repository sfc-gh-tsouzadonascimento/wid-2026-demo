<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Q&A — RetailBank Operations Agent</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #0a0a1a;
            color: #eee;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        header {
            padding: 20px 40px;
            background: #111128;
            border-bottom: 2px solid #e94560;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-shrink: 0;
        }
        header h1 {
            font-size: 1.6rem;
            color: #fff;
        }
        .counter {
            font-size: 1rem;
            color: #888;
        }
        .counter span { color: #e94560; font-weight: 700; }
        .feed {
            flex: 1;
            overflow-y: auto;
            padding: 30px 40px;
            scroll-behavior: smooth;
        }
        .empty-state {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100%;
            color: #444;
            font-size: 1.4rem;
            font-style: italic;
        }
        .qa-card {
            margin-bottom: 28px;
            animation: fadeIn 0.4s ease;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .question-bubble {
            background: #1a1a3e;
            border-left: 4px solid #e94560;
            padding: 16px 20px;
            border-radius: 0 12px 12px 0;
            margin-bottom: 12px;
        }
        .question-bubble .label {
            font-size: 0.75rem;
            color: #e94560;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 6px;
        }
        .question-bubble .text {
            font-size: 1.3rem;
            font-weight: 600;
            color: #fff;
            line-height: 1.4;
        }
        .answer-bubble {
            background: #111128;
            border-left: 4px solid #30d158;
            padding: 16px 20px;
            border-radius: 0 12px 12px 0;
            margin-left: 24px;
        }
        .answer-bubble .label {
            font-size: 0.75rem;
            color: #30d158;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 6px;
        }
        .answer-bubble .text {
            font-size: 1.05rem;
            color: #ccc;
            line-height: 1.6;
            white-space: pre-wrap;
        }
        .timestamp {
            text-align: right;
            font-size: 0.75rem;
            color: #444;
            margin-top: 6px;
        }
        .connection-status {
            position: fixed;
            bottom: 12px;
            right: 20px;
            font-size: 0.75rem;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .dot {
            width: 8px; height: 8px;
            border-radius: 50%;
            background: #30d158;
        }
        .dot.disconnected { background: #e94560; }
    </style>
</head>
<body>
    <header>
        <h1>Live Q&A — RetailBank Morning Assistant</h1>
        <div class="counter"><span id="count">0</span> questions</div>
    </header>

    <div class="feed" id="feed">
        <div class="empty-state" id="emptyState">Waiting for questions...</div>
    </div>

    <div class="connection-status">
        <div class="dot" id="statusDot"></div>
        <span id="statusText" style="color: #555;">Connected</span>
    </div>

    <script>
        const feed = document.getElementById('feed');
        const emptyState = document.getElementById('emptyState');
        const countEl = document.getElementById('count');
        const statusDot = document.getElementById('statusDot');
        const statusText = document.getElementById('statusText');
        let questionCount = 0;

        function addCard(entry) {
            emptyState.style.display = 'none';
            questionCount++;
            countEl.textContent = questionCount;

            const card = document.createElement('div');
            card.className = 'qa-card';
            card.innerHTML = `
                <div class="question-bubble">
                    <div class="label">Audience Question</div>
                    <div class="text">${escapeHtml(entry.question)}</div>
                </div>
                <div class="answer-bubble">
                    <div class="label">Morning Assistant</div>
                    <div class="text">${escapeHtml(entry.answer)}</div>
                </div>
                <div class="timestamp">${entry.timestamp}</div>
            `;
            feed.appendChild(card);
            feed.scrollTop = feed.scrollHeight;
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function connectSSE() {
            const source = new EventSource('/api/feed');

            source.onmessage = (event) => {
                const entry = JSON.parse(event.data);
                addCard(entry);
            };

            source.onopen = () => {
                statusDot.className = 'dot';
                statusText.textContent = 'Connected';
            };

            source.onerror = () => {
                statusDot.className = 'dot disconnected';
                statusText.textContent = 'Reconnecting...';
                source.close();
                setTimeout(connectSSE, 3000);
            };
        }

        connectSSE();
    </script>
</body>
</html>
