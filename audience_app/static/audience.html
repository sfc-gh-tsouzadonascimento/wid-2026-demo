<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ask the AI</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #1a1a2e;
            color: #eee;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .container {
            width: 100%;
            max-width: 480px;
            text-align: center;
        }
        h1 {
            font-size: 2rem;
            margin-bottom: 8px;
            color: #fff;
        }
        .subtitle {
            color: #888;
            font-size: 0.9rem;
            margin-bottom: 32px;
        }
        textarea {
            width: 100%;
            min-height: 120px;
            padding: 16px;
            border: 2px solid #333;
            border-radius: 12px;
            background: #16213e;
            color: #eee;
            font-size: 1rem;
            font-family: inherit;
            resize: vertical;
            outline: none;
            transition: border-color 0.2s;
        }
        textarea:focus { border-color: #e94560; }
        textarea::placeholder { color: #555; }
        .btn {
            display: inline-block;
            margin-top: 16px;
            padding: 14px 40px;
            background: #e94560;
            color: #fff;
            border: none;
            border-radius: 10px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s, transform 0.1s;
            width: 100%;
        }
        .btn:hover { background: #c73652; }
        .btn:active { transform: scale(0.98); }
        .btn:disabled { background: #555; cursor: not-allowed; }
        .status {
            margin-top: 20px;
            padding: 16px;
            border-radius: 10px;
            display: none;
            font-size: 0.95rem;
            line-height: 1.5;
        }
        .status.success { display: block; background: #0f3d0f; color: #6fdf6f; }
        .status.error { display: block; background: #3d0f0f; color: #df6f6f; }
        .status.loading { display: block; background: #16213e; color: #aaa; }
        .branding {
            position: fixed;
            bottom: 16px;
            color: #444;
            font-size: 0.75rem;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Ask the AI</h1>
        <p class="subtitle">Type your question for the RetailBank Operations Agent</p>
        <textarea id="question" placeholder="e.g. Which customer segments have the highest churn risk?" maxlength="500"></textarea>
        <button class="btn" id="submitBtn" onclick="submitQuestion()">Submit Question</button>
        <div class="status" id="status"></div>
    </div>
    <div class="branding">RetailBank 2028</div>

    <script>
        async function submitQuestion() {
            const textarea = document.getElementById('question');
            const btn = document.getElementById('submitBtn');
            const status = document.getElementById('status');
            const question = textarea.value.trim();

            if (!question) return;

            btn.disabled = true;
            btn.textContent = 'Sending...';
            status.className = 'status loading';
            status.textContent = 'Sending your question to the AI...';

            try {
                const resp = await fetch('/api/ask', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ question }),
                });
                const data = await resp.json();

                if (resp.ok) {
                    status.className = 'status success';
                    status.textContent = 'Thank you! Your question has been submitted and is now on screen.';
                    textarea.value = '';
                } else {
                    status.className = 'status error';
                    status.textContent = data.error || 'Something went wrong.';
                }
            } catch (e) {
                status.className = 'status error';
                status.textContent = 'Network error. Please try again.';
            }

            btn.disabled = false;
            btn.textContent = 'Submit Question';
        }

        // Submit on Ctrl+Enter
        document.getElementById('question').addEventListener('keydown', (e) => {
            if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') submitQuestion();
        });
    </script>
</body>
</html>
